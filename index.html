<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>망고아트 AI 마케팅 콘텐츠 스튜디오</title>
    <style>
      :root {
        --mango-50: #fff9e9;
        --mango-200: #ffe08a;
        --mango-500: #ff9f1a;
        --mango-700: #c56c00;
        --text-main: #2f2411;
        --text-sub: #6b5325;
        --border: #f0d8a7;
        --card: #fffef9;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; color: var(--text-main); background: linear-gradient(180deg, var(--mango-50), #fff 35%); }
      .wrap { max-width: 1160px; margin: 0 auto; padding: 20px 14px 50px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 6px 18px rgba(255, 185, 56, 0.12); }
      h1 { margin: 0 0 6px; color: #8a4e00; }
      .desc { margin: 0; color: var(--text-sub); }
      .flow { display:grid; grid-template-columns: repeat(5,minmax(0,1fr)); gap:8px; margin-top:14px; }
      .flowStep { background:#fff7df; border:1px solid var(--border); border-radius:999px; padding:8px; font-size:13px; text-align:center; font-weight:700; }
      .grid { display:grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap:10px; }
      label { display:flex; flex-direction:column; gap:6px; font-size:13px; font-weight:700; }
      input,select,textarea { width:100%; padding:10px; border:1px solid #efc97a; border-radius:10px; font-size:14px; background:#fff; }
      textarea { min-height:96px; resize:vertical; }
      .full { grid-column:1/-1; }
      .actions { display:grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap:8px; grid-column:1/-1; }
      button { border:0; border-radius:10px; padding:10px; font-weight:800; cursor:pointer; }
      .primary { color:#fff; background:linear-gradient(120deg,var(--mango-500),#ffb938); }
      .ghost { color:#8a4e00; background:#fff8e6; border:1px solid #efc97a; }
      .cardHeader { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px; }
      .copyBtn { border:1px solid #efc97a; background:#fff9ea; color:#8a4e00; padding:6px 9px; border-radius:8px; }
      pre { margin:0; white-space:pre-wrap; line-height:1.6; }
      .thumb { max-width:200px; border-radius:10px; border:1px solid var(--border); }
      .savedGrid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
      .savedItem { border:1px solid var(--border); background:#fffdf4; border-radius:12px; padding:10px; }
      .toast { position:fixed; right:16px; bottom:16px; background:#3f2b06; color:#fff; padding:10px 14px; border-radius:8px; opacity:0; transform:translateY(8px); transition:.2s; pointer-events:none; }
      .toast.show { opacity:1; transform:translateY(0); }
      @media (max-width: 900px) { .actions,.flow { grid-template-columns:repeat(2,minmax(0,1fr)); } }
      @media (max-width: 768px) { .grid,.savedGrid,.flow { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>망고아트 AI 마케팅 콘텐츠 스튜디오</h1>
        <p class="desc">이미지 업로드 → 텍스트 추출(OCR) → GPT 콘텐츠 생성 → 인스타/유튜브/블로그 포맷 → 저장/재활용 + 이미지/영상 생성 프롬프트 자동화.</p>
        <div class="flow">
          <div class="flowStep">1. 이미지 업로드</div><div class="flowStep">2. OCR 분석</div><div class="flowStep">3. GPT 생성</div><div class="flowStep">4. 채널 포맷</div><div class="flowStep">5. 저장/재활용</div>
        </div>
      </section>

      <form id="contentForm" class="card grid">
        <label class="full">이미지 업로드<input type="file" id="imageInput" accept="image/*" /></label>
        <label>OCR 공급자
          <select name="ocrProvider"><option value="vision">Google Vision</option><option value="rekognition">AWS Rekognition</option></select>
        </label>
        <label>OpenAI API Key<input name="openaiApiKey" type="password" placeholder="sk-..." /></label>
        <label>Google Vision API Key<input name="googleApiKey" type="password" placeholder="선택 사항" /></label>
        <label>AWS Access Key<input name="awsAccessKey" type="password" placeholder="선택 사항" /></label>
        <label>AWS Secret Key<input name="awsSecretKey" type="password" placeholder="선택 사항" /></label>
        <label>브랜드/상품명<input name="brand" placeholder="예: 망고아트" /></label>
        <label>업종<input name="industry" placeholder="예: 카페" /></label>
        <label>목표 고객<input name="target" placeholder="예: 20~30대 직장인" /></label>
        <label>캠페인 목표<input name="goal" placeholder="예: 문의 전환" /></label>
        <label class="full">추가 지시사항<textarea name="extraInstruction" placeholder="톤, 금지어, CTA 등"></textarea></label>
        <label class="full">OCR 추출 텍스트(수정 가능)<textarea id="ocrText" name="ocrText" placeholder="이미지 분석 결과가 여기에 자동 반영됩니다."></textarea></label>

        <div class="actions">
          <button class="ghost" type="button" id="analyzeBtn">OCR 분석</button>
          <button class="primary" type="submit">콘텐츠 생성</button>
          <button class="ghost" type="button" id="saveBtn">저장하기</button>
          <button class="ghost" type="button" id="copyAllBtn">전체 복사</button>
        </div>
      </form>

      <section id="preview" class="card"></section>
      <section id="results"></section>
      <section class="card"><div class="cardHeader"><h2>저장된 자산</h2><button id="clearSavedBtn" class="ghost" type="button">전체 삭제</button></div><div id="savedList" class="savedGrid"></div></section>
    </main>
    <div id="toast" class="toast"></div>

    <script>
      const STORAGE_KEY = 'mangoart_ai_assets_v1';
      let imageBase64 = ''; let currentContent = null;
      const $ = (id) => document.getElementById(id);
      const toast = (msg) => { const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toast.timer); toast.timer=setTimeout(()=>t.classList.remove('show'),1200); };

      $('imageInput').addEventListener('change', (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = () => { imageBase64 = String(reader.result).split(',')[1] || ''; $('preview').innerHTML = `<h3>업로드 미리보기</h3><img class="thumb" src="${reader.result}" alt="업로드 이미지"/>`; };
        reader.readAsDataURL(file);
      });

      async function runOcr(provider, form) {
        if (!imageBase64) throw new Error('이미지를 먼저 업로드해 주세요.');
        if (provider === 'vision') {
          if (!form.googleApiKey) throw new Error('Google Vision API Key를 입력해 주세요.');
          const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${form.googleApiKey}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({requests:[{image:{content:imageBase64},features:[{type:'TEXT_DETECTION'}]}]}) });
          const data = await res.json();
          return data.responses?.[0]?.fullTextAnnotation?.text || '텍스트 미검출';
        }
        throw new Error('AWS Rekognition은 브라우저 직접 호출 제한으로 데모에서는 미지원입니다. Google Vision을 사용해 주세요.');
      }

      async function generateContent(form) {
        if (!form.openaiApiKey) throw new Error('OpenAI API Key를 입력해 주세요.');
        const prompt = `다음 정보를 기반으로 한국어 마케팅 콘텐츠 JSON만 생성해줘.\n브랜드:${form.brand}\n업종:${form.industry}\n타겟:${form.target}\n목표:${form.goal}\nOCR:${form.ocrText}\n추가:${form.extraInstruction}\n필드: blog_title, blog_body, instagram_post, youtube_description, image_prompt, video_storyboard(배열5개).`;
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${form.openaiApiKey}`},
          body: JSON.stringify({ model:'gpt-4o-mini', messages:[{role:'system',content:'너는 퍼포먼스 마케터다. 결과는 JSON만.'},{role:'user',content:prompt}], temperature:0.8 })
        });
        const data = await res.json();
        const raw = data.choices?.[0]?.message?.content || '{}';
        return JSON.parse(raw.replace(/```json|```/g,''));
      }

      function renderResults(c) {
        currentContent = c;
        const blocks = [['블로그 제목', c.blog_title], ['블로그 본문', c.blog_body], ['인스타그램 게시글', c.instagram_post], ['유튜브 설명', c.youtube_description], ['이미지 생성 프롬프트', c.image_prompt], ['영상 스토리보드(5컷)', (c.video_storyboard||[]).map((v,i)=>`${i+1}. ${v}`).join('\n')]];
        $('results').innerHTML = blocks.map(([t,v]) => `<section class="card"><div class="cardHeader"><h3>${t}</h3><button class="copyBtn" type="button" onclick='copyBlock(${JSON.stringify(String(v||'')).replace(/'/g,"&#39;")})'>복사</button></div><pre>${String(v||'')}</pre></section>`).join('');
      }
      window.copyBlock = async (txt) => { await navigator.clipboard.writeText(txt); toast('복사 완료'); };

      $('analyzeBtn').addEventListener('click', async () => {
        try {
          const fd = Object.fromEntries(new FormData($('contentForm')).entries());
          $('ocrText').value = await runOcr(fd.ocrProvider, fd); toast('OCR 분석 완료');
        } catch (e) { toast(e.message); }
      });

      $('contentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        try { const fd = Object.fromEntries(new FormData($('contentForm')).entries()); const c = await generateContent(fd); renderResults(c); toast('콘텐츠 생성 완료'); }
        catch (err) { toast('생성 실패: ' + err.message); }
      });

      function saved() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); } catch { return []; } }
      function persist(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
      function renderSaved() {
        const list = saved();
        $('savedList').innerHTML = list.length ? list.map(x=>`<article class='savedItem'><p>${x.time} | ${x.brand} | ${x.industry}</p><button class='ghost' onclick='reuse(${x.id})'>재활용</button></article>`).join('') : '<p>저장된 콘텐츠가 없습니다.</p>';
      }
      window.reuse = (id) => {
        const item = saved().find(x=>x.id===id); if (!item) return;
        Object.entries(item.form).forEach(([k,v])=>{ if ($('contentForm').elements[k]) $('contentForm').elements[k].value=v; });
        $('ocrText').value = item.form.ocrText || ''; renderResults(item.content); toast('저장 콘텐츠 재활용 완료');
      };

      $('saveBtn').addEventListener('click', () => {
        if (!currentContent) return toast('먼저 콘텐츠를 생성해 주세요.');
        const form = Object.fromEntries(new FormData($('contentForm')).entries());
        const list = saved(); list.unshift({ id: Date.now(), time: new Date().toISOString().slice(0,16).replace('T',' '), brand: form.brand || '브랜드', industry: form.industry || '업종', form, content: currentContent });
        persist(list.slice(0,50)); renderSaved(); toast('저장 완료');
      });
      $('copyAllBtn').addEventListener('click', async () => {
        if (!currentContent) return toast('먼저 콘텐츠를 생성해 주세요.');
        await navigator.clipboard.writeText(JSON.stringify(currentContent, null, 2)); toast('전체 복사 완료');
      });
      $('clearSavedBtn').addEventListener('click', () => { localStorage.removeItem(STORAGE_KEY); renderSaved(); toast('전체 삭제 완료'); });
      renderSaved(); $('preview').innerHTML='<p class="desc">업로드한 이미지가 이 영역에 표시됩니다.</p>';
    </script>
  </body>
</html>
