<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>망고아트 마케팅 콘텐츠 자동 생성기</title>
    <style>
      :root {
        --mango-50: #fff9e9;
        --mango-100: #ffefbf;
        --mango-200: #ffe08a;
        --mango-400: #ffb938;
        --mango-500: #ff9f1a;
        --mango-700: #c56c00;
        --text-main: #2f2411;
        --border: #f0d8a7;
        --card: #fffef9;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
        color: var(--text-main);
        background: linear-gradient(180deg, var(--mango-50), #fff);
      }

      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px 16px 56px;
      }

      h1 { margin: 0 0 8px; color: #8a4e00; }
      .desc { margin: 0 0 18px; color: #8b6a32; }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 14px;
        box-shadow: 0 6px 18px rgba(255, 185, 56, 0.12);
      }

      .formGrid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-weight: 700;
      }

      input {
        width: 100%;
        padding: 11px;
        border: 1px solid #efc97a;
        border-radius: 10px;
        font-size: 14px;
        background: #fff;
      }

      .generateBtn {
        grid-column: 1 / -1;
        border: 0;
        border-radius: 10px;
        padding: 12px;
        font-size: 15px;
        font-weight: 800;
        color: #fff;
        background: linear-gradient(120deg, var(--mango-500), var(--mango-400));
        cursor: pointer;
      }

      .cardHeader {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }

      h3 { margin: 0; }

      .copyBtn {
        border: 1px solid #efc97a;
        border-radius: 8px;
        padding: 7px 10px;
        background: #fff9ea;
        color: #8a4e00;
        font-weight: 700;
        cursor: pointer;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.6;
        font-family: inherit;
      }

      ol { margin: 0 0 0 20px; padding: 0; line-height: 1.6; }

      .toast {
        position: fixed;
        right: 16px;
        bottom: 16px;
        background: #3f2b06;
        color: #fff;
        padding: 10px 14px;
        border-radius: 8px;
        opacity: 0;
        transform: translateY(8px);
        transition: 0.2s;
        pointer-events: none;
      }
      .toast.show { opacity: 1; transform: translateY(0); }

      @media (max-width: 768px) {
        .formGrid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header>
        <h1>망고아트 마케팅 콘텐츠 자동 생성기</h1>
        <p class="desc">입력값 기반 템플릿으로 블로그/인스타/쇼츠/상담 문구를 빠르게 생성합니다.</p>
      </header>

      <form id="contentForm" class="card formGrid">
        <label>제작 품목<input name="item" placeholder="예: 실사출력 배너" /></label>
        <label>업종<input name="industry" placeholder="예: 카페, 학원, 피부샵" /></label>
        <label>고객 문제<input name="customerProblem" placeholder="예: 방문은 있는데 문의 전환이 낮음" /></label>
        <label>제작 내용<input name="productionDetail" placeholder="예: 매장 동선 맞춤 POP/배너 세트 제작" /></label>
        <label>강조 포인트<input name="highlightPoint" placeholder="예: 3초 시선 고정 헤드카피" /></label>
        <label>지역 입력<input name="region" placeholder="예: 수원 영통" /></label>
        <button class="generateBtn" type="submit">콘텐츠 생성</button>
      </form>

      <section id="results"></section>
    </main>

    <div id="toast" class="toast"></div>

    <script>
      const defaults = {
        item: '맞춤 제작물',
        industry: '일반 업종',
        customerProblem: '고객 유입이 정체된 상황',
        productionDetail: '브랜드 맞춤형 디자인 제작',
        highlightPoint: '전환을 만드는 핵심 포인트 반영',
        region: '우리 지역'
      };

      function normalize(form) {
        return {
          item: form.item || defaults.item,
          industry: form.industry || defaults.industry,
          customerProblem: form.customerProblem || defaults.customerProblem,
          productionDetail: form.productionDetail || defaults.productionDetail,
          highlightPoint: form.highlightPoint || defaults.highlightPoint,
          region: form.region || defaults.region
        };
      }

      function buildContent(form) {
        const d = normalize(form);
        const blogTitles = [
          `[${d.region}] ${d.industry} 사장님이 ${d.item} 제작 전 꼭 알아야 할 3가지`,
          `${d.customerProblem} 해결! ${d.item}로 매출 연결하는 실전 전략`,
          `${d.region} ${d.industry} 성공사례: ${d.productionDetail}로 만든 변화`
        ];

        const blogBody = `안녕하세요, 망고아트입니다.\n\n${d.region}에서 ${d.industry}를 운영하는 분들이 가장 많이 겪는 고민은 바로 “${d.customerProblem}”입니다.\n\n이번 프로젝트에서는 ${d.item} 제작 시 단순히 보기 좋은 결과물이 아니라, 실제 문의와 방문으로 이어지도록 ${d.productionDetail}에 집중했습니다.\n\n특히 핵심은 ${d.highlightPoint}입니다. 이 포인트를 중심으로 디자인과 문구, 전달 방식을 정리하면 고객이 바로 이해하고 행동하기 쉬워집니다.\n\n망고아트는 업종과 지역 특성에 맞춘 기획으로, 제작 이후에도 활용 가능한 콘텐츠 포맷까지 함께 제공합니다.\n\n${d.industry} 마케팅이 막막하다면, 망고아트와 함께 “보이는 콘텐츠”를 “성과 나는 콘텐츠”로 바꿔보세요.`;

        const instagramPost = `📍${d.region} ${d.industry} 사장님 주목!\n\n"${d.customerProblem}" 때문에 고민 중이신가요?\n\n망고아트는 ${d.item} 제작 시\n✅ ${d.productionDetail}\n✅ ${d.highlightPoint}\n를 중심으로 결과물을 만듭니다.\n\n눈길만 끄는 콘텐츠가 아니라,\n문의/예약/방문으로 연결되는 콘텐츠가 필요하다면\n지금 바로 상담하세요 🙌\n\n#${d.region.replace(/\s+/g, '')} #${d.industry.replace(/\s+/g, '')} #망고아트 #마케팅콘텐츠 #디자인제작`;

        const reelsScript = `오프닝: "${d.customerProblem}, 아직도 반복되고 있나요?"\n\n장면1: ${d.region} ${d.industry} 현장 컷\n나레이션: "고객은 많은데 전환이 안 된다면 콘텐츠 구조부터 바꿔야 합니다."\n\n장면2: ${d.item} 제작 과정\n나레이션: "이번 작업은 ${d.productionDetail}에 집중했습니다."\n\n장면3: 핵심 포인트 강조 자막\n나레이션: "성과 차이를 만드는 핵심은 ${d.highlightPoint}!"\n\n클로징: "우리 매장에 맞는 콘텐츠가 필요하다면 망고아트로 문의하세요."`;

        const shortsTitles = [
          `${d.customerProblem} 해결하는 ${d.item} 제작법`,
          `${d.region} ${d.industry} 사장님이 바로 쓰는 마케팅 팁`,
          `문의율 올리는 ${d.highlightPoint} 적용법`,
          `${d.item} 하나로 고객 반응 바꾸는 방법`,
          `망고아트 실제 제작: ${d.productionDetail}`
        ];

        const youtubeDescription = `${d.region} ${d.industry} 현장에서 바로 적용 가능한 마케팅 콘텐츠 제작 사례를 소개합니다.\n\n이번 영상에서는 ${d.customerProblem}를 해결하기 위해 ${d.item} 제작 시 어떤 전략을 사용했는지 설명합니다.\n핵심은 ${d.highlightPoint}이며, 실제 제작 내용은 ${d.productionDetail}입니다.\n\n상담 문의: 카카오톡 채널 '망고아트'\n\n#망고아트 #${d.industry.replace(/\s+/g, '')} #${d.region.replace(/\s+/g, '')} #마케팅콘텐츠 #쇼츠마케팅`;

        const kakaoMessage = `안녕하세요, 망고아트입니다 😊\n\n${d.region} ${d.industry} 관련 ${d.item} 제작 문의 남겨주셔서 감사합니다.\n현재 가장 고민하시는 "${d.customerProblem}" 해결을 위해\n${d.productionDetail} 중심으로 제안드릴 수 있어요.\n\n특히 ${d.highlightPoint}를 반영해\n실제 반응이 나오는 콘텐츠로 도와드리겠습니다.\n편하신 시간대 알려주시면 빠르게 상담 도와드릴게요!`;

        return { blogTitles, blogBody, instagramPost, reelsScript, shortsTitles, youtubeDescription, kakaoMessage };
      }

      function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => el.classList.remove('show'), 1200);
      }

      async function copyText(title, value) {
        const text = Array.isArray(value) ? value.join('\n') : value;
        try {
          await navigator.clipboard.writeText(text);
          showToast(title + ' 복사 완료');
        } catch (_) {
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
          showToast(title + ' 복사 완료');
        }
      }

      function renderResults(content) {
        const blocks = [
          ['블로그 제목 3개', content.blogTitles],
          ['블로그 본문', content.blogBody],
          ['인스타 게시글', content.instagramPost],
          ['릴스 대본', content.reelsScript],
          ['유튜브 쇼츠 제목 5개', content.shortsTitles],
          ['유튜브 설명 + 해시태그', content.youtubeDescription],
          ['카카오 상담 문구 자동 생성', content.kakaoMessage]
        ];

        const root = document.getElementById('results');
        root.innerHTML = '';

        blocks.forEach(([title, value], idx) => {
          const card = document.createElement('section');
          card.className = 'card';

          const header = document.createElement('div');
          header.className = 'cardHeader';

          const h3 = document.createElement('h3');
          h3.textContent = title;

          const btn = document.createElement('button');
          btn.className = 'copyBtn';
          btn.type = 'button';
          btn.textContent = '복사';
          btn.addEventListener('click', () => copyText(title, value));

          header.appendChild(h3);
          header.appendChild(btn);
          card.appendChild(header);

          if (Array.isArray(value)) {
            const ol = document.createElement('ol');
            value.forEach((item) => {
              const li = document.createElement('li');
              li.textContent = item;
              ol.appendChild(li);
            });
            card.appendChild(ol);
          } else {
            const pre = document.createElement('pre');
            pre.textContent = value;
            card.appendChild(pre);
          }

          root.appendChild(card);
        });
      }

      document.getElementById('contentForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const fd = new FormData(e.target);
        const form = Object.fromEntries(fd.entries());
        renderResults(buildContent(form));
      });

      renderResults(buildContent({}));
    </script>
  </body>
</html>
