<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>망고아트 마케팅 콘텐츠 자동 생성기 (업무용)</title>
    <style>
      :root {
        --mango-50: #fff9e9;
        --mango-100: #ffefbf;
        --mango-200: #ffe08a;
        --mango-300: #ffd35d;
        --mango-400: #ffb938;
        --mango-500: #ff9f1a;
        --mango-700: #c56c00;
        --text-main: #2f2411;
        --text-sub: #6b5325;
        --border: #f0d8a7;
        --card: #fffef9;
        --danger: #b13c14;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
        color: var(--text-main);
        background: linear-gradient(180deg, var(--mango-50), #fff 30%);
      }

      .wrap {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px 16px 56px;
      }

      h1 { margin: 0 0 8px; color: #8a4e00; font-size: clamp(1.35rem, 3vw, 2rem); }
      .desc { margin: 0; color: var(--text-sub); }

      .flow {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin: 16px 0;
      }
      .flowStep {
        background: #fff7df;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 8px 12px;
        font-weight: 700;
        font-size: 13px;
        text-align: center;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 14px;
        box-shadow: 0 6px 18px rgba(255, 185, 56, 0.12);
      }

      .formGrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      label { display: flex; flex-direction: column; gap: 6px; font-weight: 700; font-size: 14px; }
      input {
        width: 100%; padding: 11px; border: 1px solid #efc97a; border-radius: 10px; font-size: 14px; background: #fff;
      }
      .full { grid-column: 1 / -1; }

      .actions { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; grid-column: 1 / -1; }
      button {
        border: 0; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 800; cursor: pointer;
      }
      .primary { color: #fff; background: linear-gradient(120deg, var(--mango-500), var(--mango-400)); }
      .ghost { color: #8a4e00; background: #fff8e6; border: 1px solid #efc97a; }
      .danger { color: #fff; background: var(--danger); }

      .cardHeader { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px; }
      h2,h3 { margin: 0; }
      .copyBtn {
        border: 1px solid #efc97a; border-radius: 8px; padding: 7px 10px; background: #fff9ea; color: #8a4e00; font-weight: 700; cursor: pointer;
      }

      pre { margin: 0; white-space: pre-wrap; line-height: 1.65; font-family: inherit; }
      ol { margin: 0 0 0 20px; padding: 0; line-height: 1.65; }

      .savedGrid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .savedItem {
        border: 1px solid var(--border);
        background: #fffdf4;
        border-radius: 12px;
        padding: 12px;
      }
      .savedMeta { font-size: 13px; color: var(--text-sub); margin: 0 0 8px; line-height: 1.6; }
      .savedBtns { display: flex; gap: 8px; }
      .savedBtns button { flex: 1; padding: 8px; font-size: 13px; }

      .empty { margin: 0; color: #8f7a54; font-size: 14px; }

      .toast {
        position: fixed; right: 16px; bottom: 16px; background: #3f2b06; color: #fff; padding: 10px 14px; border-radius: 8px;
        opacity: 0; transform: translateY(8px); transition: 0.2s; pointer-events: none;
      }
      .toast.show { opacity: 1; transform: translateY(0); }

      @media (max-width: 900px) {
        .actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 768px) {
        .formGrid, .savedGrid, .flow { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="card">
        <h1>망고아트 마케팅 콘텐츠 자동 생성기 (업무용)</h1>
        <p class="desc">고객 상담 정보까지 반영해 실무에 바로 올릴 콘텐츠를 생성하고 저장하세요.</p>
        <div class="flow" aria-label="작업 흐름">
          <div class="flowStep">오늘 작업</div>
          <div class="flowStep">콘텐츠 생성</div>
          <div class="flowStep">저장</div>
          <div class="flowStep">업로드</div>
        </div>
      </header>

      <form id="contentForm" class="card formGrid">
        <label>고객명<input name="customerName" placeholder="예: 영통점 홍길동 대표" /></label>
        <label>제작 품목<input name="item" placeholder="예: 실사출력 배너" /></label>
        <label>업종<input name="industry" placeholder="예: 카페, 학원, 피부샵" /></label>
        <label>지역<input name="region" placeholder="예: 수원 영통" /></label>
        <label>사용 목적<input name="usagePurpose" placeholder="예: 오픈 프로모션 문의 전환" /></label>
        <label>문의 전화번호<input name="phone" placeholder="예: 010-1234-5678" /></label>
        <label class="full">고객 문제<input name="customerProblem" placeholder="예: 방문은 있는데 문의 전환이 낮음" /></label>
        <label class="full">제작 내용<input name="productionDetail" placeholder="예: 매장 동선 맞춤 POP/배너 세트 제작" /></label>
        <label class="full">강조 포인트<input name="highlightPoint" placeholder="예: 3초 시선 고정 헤드카피" /></label>
        <label class="full">카카오채널 문구<input name="kakaoChannel" placeholder="예: 카카오채널 @망고아트" /></label>

        <div class="actions">
          <button class="primary" type="submit">콘텐츠 생성</button>
          <button class="ghost" id="copyAllBtn" type="button">전체 복사</button>
          <button class="ghost" id="saveBtn" type="button">저장하기</button>
          <button class="ghost" id="resetBtn" type="button">입력 초기화</button>
        </div>
      </form>

      <section id="results"></section>

      <section class="card">
        <div class="cardHeader">
          <h2>저장된 작업 사례</h2>
          <button id="clearSavedBtn" class="danger" type="button">저장 목록 전체 삭제</button>
        </div>
        <div id="savedList" class="savedGrid"></div>
      </section>
    </main>

    <div id="toast" class="toast"></div>

    <script>
      const STORAGE_KEY = 'mangoart_saved_jobs_v2';
      let currentContent = null;

      const defaults = {
        customerName: '고객사 담당자', item: '맞춤 제작물', industry: '일반 업종', region: '우리 지역',
        usagePurpose: '상담 전환 확대', phone: '010-0000-0000', customerProblem: '고객 유입이 정체된 상황',
        productionDetail: '브랜드 맞춤형 디자인 제작', highlightPoint: '전환을 만드는 핵심 포인트 반영', kakaoChannel: '카카오채널 @망고아트'
      };

      function normalize(form) {
        return Object.fromEntries(Object.entries(defaults).map(([k, v]) => [k, (form[k] || '').trim() || v]));
      }

      function nowString() {
        const d = new Date();
        const p = (n) => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
      }

      function buildContent(form) {
        const d = normalize(form);
        const tagRegion = d.region.replace(/\s+/g, '');
        const tagIndustry = d.industry.replace(/\s+/g, '');

        const blogTitles = [
          `${d.region} ${d.industry} ${d.item} 제작, ${d.usagePurpose}를 높이는 실전 방법`,
          `${d.customerProblem} 고민일 때: ${d.region} ${d.industry} 맞춤 ${d.item} 전략`,
          `${d.region} ${d.industry} 사장님 검색 필수, 문의 늘리는 ${d.item} 제작 체크리스트`
        ];

        const blogBody = `안녕하세요. 망고아트입니다.\n\n${d.customerName}님처럼 ${d.region}에서 ${d.industry}를 운영하시는 분들이 자주 말씀하시는 고민은 “${d.customerProblem}”입니다.\n\n이번 기획의 목표는 단순 제작이 아니라 ${d.usagePurpose}였습니다. 그래서 ${d.item}를 만들 때도 보기 좋은 구성보다 고객 행동을 먼저 설계했습니다.\n\n실무에서는 ${d.productionDetail}에 집중했고, 특히 ${d.highlightPoint}를 중심으로 문구·레이아웃·노출 위치를 잡았습니다. 이 과정에서 고객이 ‘무엇을, 왜 지금 해야 하는지’를 3초 안에 이해하도록 구성하는 것이 핵심이었습니다.\n\n결과적으로 상담 연결 흐름이 매끄러워지고, 현장에서는 문의 응대 속도도 빨라졌습니다. 같은 업종이라도 지역과 매장 상황에 따라 정답이 다르기 때문에 맞춤 설계가 중요합니다.\n\n${d.region} ${d.industry} 매장에 맞는 ${d.item} 기획이 필요하시면 ${d.kakaoChannel} 또는 ${d.phone}로 편하게 문의 주세요. 빠르게 현재 상황을 진단해 실전형 제작안으로 안내드리겠습니다.`;

        const instagramPost = `${d.region} ${d.industry} 사장님,\n문의 전환은 “디자인”보다 “구조”가 먼저입니다.\n\n${d.item} 하나도 ${d.highlightPoint}를 잡으면 반응이 달라집니다.\n지금 ${d.usagePurpose}가 필요하다면 망고아트로 바로 상담 주세요.\n☎ ${d.phone}\n💬 ${d.kakaoChannel}\n\n#망고아트 #${tagRegion} #${tagIndustry} #마케팅콘텐츠 #매출전환`;

        const reelsScript = `오프닝(자막): "${d.customerProblem}, 아직도 반복되나요?"\n\n장면1(현장): ${d.region} ${d.industry} 매장 전경\n내레이션: "고객은 오는데 문의가 안 남는다면 콘텐츠 동선부터 바꿔야 합니다."\n\n장면2(제작): ${d.item} 제작 디테일 컷\n내레이션: "이번 작업은 ${d.productionDetail}에 집중했습니다."\n\n장면3(핵심): 강조 자막 + before/after\n내레이션: "성과 차이를 만든 포인트는 ${d.highlightPoint}."\n\n클로징(CTA): "${d.usagePurpose}가 목표라면 지금 망고아트로 상담하세요. ${d.kakaoChannel}"`;

        const shortsTitles = [
          `이 제목 보면 클릭합니다: ${d.customerProblem} 해결법`,
          `${d.region} ${d.industry} 매출 올린 ${d.item} 핵심 1가지`,
          `문의 폭발 직전? ${d.highlightPoint} 바로 적용해보세요`,
          `사장님 필수 시청: ${d.usagePurpose} 만드는 콘텐츠 공식`,
          `3초에 꽂히는 ${d.item} 카피, 이렇게 만듭니다`
        ];

        const youtubeDescription = `${d.region} ${d.industry} 현장에서 실제로 쓰는 콘텐츠 제작 사례입니다.\n\n이번 프로젝트는 “${d.customerProblem}” 해결과 ${d.usagePurpose}를 목표로 진행했습니다.\n${d.item} 기획 과정에서 ${d.productionDetail}를 적용했고, 성과 포인트는 ${d.highlightPoint}였습니다.\n\n상담 문의\n- 전화: ${d.phone}\n- 카카오: ${d.kakaoChannel}\n\n#망고아트 #${tagIndustry} #${tagRegion} #마케팅전략 #쇼츠마케팅 #콘텐츠제작`;

        const kakaoMessage = `안녕하세요, 망고아트입니다 😊\n${d.customerName}님 문의 감사합니다.\n\n${d.region} ${d.industry} 매장 기준으로 ${d.item}를 ${d.usagePurpose} 중심으로 제안드릴 수 있습니다.\n특히 "${d.customerProblem}" 이슈는 ${d.highlightPoint}를 반영하면 상담 전환이 좋아집니다.\n\n원하시면 오늘 바로 1차 시안 방향 잡아드릴게요.\n전화 ${d.phone} 또는 ${d.kakaoChannel}로 "상담 희망" 남겨주세요!`;

        const thumbnailPhrases = [
          `${d.region} ${d.industry} 문의 폭발`,
          `${d.item} 하나로 반응 UP`,
          `${d.customerProblem} 이제 끝`,
          `3초 시선 고정 카피`,
          `${d.usagePurpose} 실전 제작 공개`
        ];

        return { blogTitles, blogBody, instagramPost, reelsScript, shortsTitles, youtubeDescription, kakaoMessage, thumbnailPhrases, form: d };
      }

      function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => el.classList.remove('show'), 1300);
      }

      async function copyText(title, value) {
        const text = Array.isArray(value) ? value.map((v, i) => `${i + 1}. ${v}`).join('\n') : value;
        try { await navigator.clipboard.writeText(text); }
        catch {
          const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
        }
        showToast(title + ' 복사 완료');
      }

      function buildAllText(content) {
        return [
          '블로그 제목 3개\n' + content.blogTitles.map((v, i) => `${i + 1}. ${v}`).join('\n'),
          '\n블로그 본문\n' + content.blogBody,
          '\n인스타 게시글\n' + content.instagramPost,
          '\n릴스 대본\n' + content.reelsScript,
          '\n유튜브 쇼츠 제목 5개\n' + content.shortsTitles.map((v, i) => `${i + 1}. ${v}`).join('\n'),
          '\n유튜브 설명 + 해시태그\n' + content.youtubeDescription,
          '\n카카오 상담 문구\n' + content.kakaoMessage,
          '\n썸네일 문구 5개\n' + content.thumbnailPhrases.map((v, i) => `${i + 1}. ${v}`).join('\n')
        ].join('\n');
      }

      function renderResults(content) {
        currentContent = content;
        const blocks = [
          ['블로그 제목 3개', content.blogTitles],
          ['블로그 본문', content.blogBody],
          ['인스타 게시글', content.instagramPost],
          ['릴스 대본', content.reelsScript],
          ['유튜브 쇼츠 제목 5개', content.shortsTitles],
          ['유튜브 설명 + 해시태그', content.youtubeDescription],
          ['카카오 상담 문구', content.kakaoMessage],
          ['썸네일 문구 5개', content.thumbnailPhrases]
        ];

        const root = document.getElementById('results');
        root.innerHTML = '';
        blocks.forEach(([title, value]) => {
          const card = document.createElement('section'); card.className = 'card';
          const header = document.createElement('div'); header.className = 'cardHeader';
          const h3 = document.createElement('h3'); h3.textContent = title;
          const btn = document.createElement('button'); btn.className = 'copyBtn'; btn.type = 'button'; btn.textContent = '복사';
          btn.addEventListener('click', () => copyText(title, value));
          header.append(h3, btn); card.appendChild(header);
          if (Array.isArray(value)) {
            const ol = document.createElement('ol'); value.forEach((item) => { const li = document.createElement('li'); li.textContent = item; ol.appendChild(li); }); card.appendChild(ol);
          } else {
            const pre = document.createElement('pre'); pre.textContent = value; card.appendChild(pre);
          }
          root.appendChild(card);
        });
      }

      function getSaved() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
        catch { return []; }
      }
      function setSaved(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }

      function saveCurrent() {
        if (!currentContent) return showToast('먼저 콘텐츠를 생성해 주세요.');
        const entry = {
          id: Date.now(),
          savedAt: nowString(),
          customerName: currentContent.form.customerName,
          item: currentContent.form.item,
          industry: currentContent.form.industry,
          region: currentContent.form.region,
          content: currentContent
        };
        const list = getSaved();
        list.unshift(entry);
        setSaved(list.slice(0, 50));
        renderSavedList();
        showToast('저장 완료');
      }

      function fillForm(data) {
        const form = document.getElementById('contentForm');
        Object.entries(data).forEach(([k, v]) => { if (form.elements[k]) form.elements[k].value = v; });
      }

      function renderSavedList() {
        const root = document.getElementById('savedList');
        const list = getSaved();
        root.innerHTML = '';
        if (!list.length) {
          root.innerHTML = '<p class="empty">저장된 사례가 없습니다. 콘텐츠를 생성한 뒤 저장해 주세요.</p>';
          return;
        }
        list.forEach((entry) => {
          const card = document.createElement('article'); card.className = 'savedItem';
          const meta = document.createElement('p'); meta.className = 'savedMeta';
          meta.textContent = `${entry.savedAt} | ${entry.customerName} | ${entry.item} | ${entry.industry} | ${entry.region}`;
          const btns = document.createElement('div'); btns.className = 'savedBtns';
          const load = document.createElement('button'); load.className = 'ghost'; load.textContent = '불러오기';
          load.addEventListener('click', () => { fillForm(entry.content.form); renderResults(entry.content); showToast('저장 항목을 불러왔습니다.'); });
          const del = document.createElement('button'); del.className = 'danger'; del.textContent = '삭제';
          del.addEventListener('click', () => { setSaved(getSaved().filter((x) => x.id !== entry.id)); renderSavedList(); showToast('삭제 완료'); });
          btns.append(load, del); card.append(meta, btns); root.appendChild(card);
        });
      }

      document.getElementById('contentForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const fd = new FormData(e.target);
        renderResults(buildContent(Object.fromEntries(fd.entries())));
      });

      document.getElementById('copyAllBtn').addEventListener('click', () => {
        if (!currentContent) return showToast('먼저 콘텐츠를 생성해 주세요.');
        copyText('전체 콘텐츠', buildAllText(currentContent));
      });
      document.getElementById('saveBtn').addEventListener('click', saveCurrent);
      document.getElementById('resetBtn').addEventListener('click', () => {
        document.getElementById('contentForm').reset();
        const blank = buildContent({});
        renderResults(blank);
        showToast('입력값을 초기화했습니다.');
      });
      document.getElementById('clearSavedBtn').addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        renderSavedList();
        showToast('저장 목록 전체 삭제 완료');
      });

      renderResults(buildContent({}));
      renderSavedList();
    </script>
  </body>
</html>
